name: 'MariaDB Node.js Test Setup'
description: 'Setup MariaDB/MySQL, certificates, and dependencies for testing'
inputs:
  db-type:
    description: 'Database type (community, enterprise, dev, mysql)'
    required: true
  db-tag:
    description: 'Database version tag'
    required: true
  test-db-password:
    description: 'Database root password'
    required: true
  test-db-database:
    description: 'Test database name'
    required: true
  test-db-port:
    description: 'Database port'
    required: true
    default: '3306'
  additional-conf:
    description: 'Additional database configuration'
    required: false
  registry-user:
    description: 'Enterprise registry user'
    required: false
  registry-password:
    description: 'Enterprise registry password'
    required: false
  os:
    description: 'Operating system'
    required: true
  init-script-folder:
    description: 'initialized directory'
    required: false
  maxscale-tag:
    description: 'MaxScale version tag (e.g., 25.01, latest). If set, MaxScale will be deployed with Enterprise MariaDB'
    required: false

outputs:
  database-type:
    description: 'Type of database that was setup'
    value: ${{ steps.mariadb-install.outputs.database-type }}
  mxs-port:
    description: 'MaxScale port (set when maxscale-tag is provided)'
    value: ${{ steps.maxscale-setup.outputs.mxs-port }}
  mxs-tls-port:
    description: 'MaxScale TLS port (set when maxscale-tag is provided)'
    value: ${{ steps.maxscale-setup.outputs.mxs-tls-port }}

runs:
  using: 'composite'
  steps:
    - name: Add hosts entry
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          echo "127.0.0.1 mariadb.example.com" >> /c/Windows/System32/drivers/etc/hosts
        else
          echo "127.0.0.1 mariadb.example.com" | sudo tee -a /etc/hosts
        fi

    - name: Generate self-signed certificates
      shell: bash
      run: |
        SCRIPT_PATH="${{ github.action_path }}/generate-certs.sh"
        if [ "$RUNNER_OS" == "Windows" ]; then
          SCRIPT_PATH=$(echo "$SCRIPT_PATH" | sed 's|\\|/|g' | sed 's|C:|/c|')
        fi
        chmod +x "$SCRIPT_PATH"
        "$SCRIPT_PATH"

    - name: Setup MariaDB
      id: mariadb-install
      if: inputs.db-type != 'mysql'
      uses: rusher/action-setup-mariadb@master
      with:
        tag: ${{ inputs.db-tag }}
        root-password: ${{ inputs.test-db-password }}
        user: testuser
        password: ${{ inputs.test-db-password }}
        database: ${{ inputs.test-db-database }}
        registry: ${{ inputs.db-type == 'enterprise' && 'docker.mariadb.com/enterprise-server' || (inputs.db-type == 'dev' && 'quay.io/mariadb-foundation/mariadb-devel' || '') }}
        registry-user: ${{ inputs.registry-user }}
        registry-password: ${{ inputs.registry-password }}
        additional-conf: |
          ${{ inputs.additional-conf }}
          ${{ '--loose-caching_sha2_password_auto_generate_rsa_keys=1'}}
          ${{ startsWith(inputs.os, 'windows') && format('--ssl-ca={0}/.github/workflows/certs/ca.crt', github.workspace) || '--ssl-ca=/etc/mysql/conf.d/ca.crt'}}
          ${{ startsWith(inputs.os, 'windows') && format('--ssl-cert={0}/.github/workflows/certs/server.crt', github.workspace) || '--ssl-cert=/etc/mysql/conf.d/server.crt'}}
          ${{ startsWith(inputs.os, 'windows') && format('--ssl-key={0}/.github/workflows/certs/server.key', github.workspace) || '--ssl-key=/etc/mysql/conf.d/server.key'}}
          ${{ '--max-connections=500'}}
        conf-script-folder: ${{ github.workspace }}/.github/workflows/certs
        init-script-folder: ${{ inputs.init-script-folder }}
        port: ${{ inputs.maxscale-tag != '' && '3305' || inputs.test-db-port }}

    - name: Setup MaxScale
      id: maxscale-setup
      if: inputs.maxscale-tag != ''
      shell: bash
      run: |
        # Export MaxScale ports as environment variables
        echo "TEST_MXS_PORT=${TEST_MXS_PORT}" >> $GITHUB_ENV
        echo "TEST_MAXSCALE_TLS_PORT=${TEST_MAXSCALE_TLS_PORT}" >> $GITHUB_ENV
        # Export as step outputs
        echo "mxs-port=${TEST_MXS_PORT}" >> $GITHUB_OUTPUT
        echo "mxs-tls-port=${TEST_MAXSCALE_TLS_PORT}" >> $GITHUB_OUTPUT
        
        SCRIPT_PATH="${{ github.action_path }}/setup-maxscale.sh"
        chmod +x "$SCRIPT_PATH"
        "$SCRIPT_PATH" \
          "${{ inputs.maxscale-tag }}" \
          "${{ inputs.registry-user }}" \
          "${{ inputs.registry-password }}" \
          "${{ inputs.test-db-password }}" \
          "${{ github.workspace }}"
      env:
        TEST_MXS_PORT: ${{ inputs.test-db-port }}
        TEST_MAXSCALE_TLS_PORT: 4009

    - name: Setup MySQL
      if: inputs.db-type == 'mysql'
      shell: bash
      run: |
        SCRIPT_PATH="${{ github.action_path }}/setup-mysql.sh"
        if [ "$RUNNER_OS" == "Windows" ]; then
          SCRIPT_PATH=$(echo "$SCRIPT_PATH" | sed 's|\\|/|g' | sed 's|C:|/c|')
        fi
        chmod +x "$SCRIPT_PATH"
        "$SCRIPT_PATH" \
          "${{ inputs.db-tag }}" \
          "${{ inputs.test-db-database }}" \
          "${{ inputs.test-db-password }}" \
          "${{ inputs.test-db-port }}" \
          "${{ inputs.registry-user }}" \
          "${{ inputs.registry-password }}" \
          "${{ inputs.db-type == 'mysql' && 'docker.io' || '' }}" \
          "${{ inputs.os }}" \
          "${{ github.workspace }}" \
          "testuser" \
          "${{ inputs.test-db-password }}"

    - name: Grant testuser privileges
      shell: bash
      run: |
        if type podman > /dev/null 2>&1; then RUNTIME="podman"; elif type docker > /dev/null 2>&1; then RUNTIME="docker"; else echo "❌ No container runtime found"; exit 1; fi
        if [ "${{ inputs.db-type }}" == "mysql" ]; then
          $RUNTIME exec mysql-test mysql -uroot -p"${{ inputs.test-db-password }}" -e "GRANT RELOAD ON *.* TO 'testuser'@'%'; FLUSH PRIVILEGES;"
        else
          $RUNTIME exec mariadbcontainer mariadb -uroot -p"${{ inputs.test-db-password }}" -e "GRANT RELOAD ON *.* TO 'testuser'@'%'; FLUSH PRIVILEGES;"
        fi

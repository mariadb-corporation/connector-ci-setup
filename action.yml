name: 'MariaDB Node.js Test Setup'
description: 'Setup MariaDB/MySQL, certificates, and dependencies for testing'
inputs:
  db-type:
    description: 'Database type (community, enterprise, dev, mysql)'
    required: true
  db-tag:
    description: 'Database version tag'
    required: true
  test-db-password:
    description: 'Database root password'
    required: true
  test-db-database:
    description: 'Test database name'
    required: true
  test-db-port:
    description: 'Database port'
    required: true
    default: '3306'
  additional-conf:
    description: 'Additional database configuration'
    required: false
  registry-user:
    description: 'Enterprise registry user'
    required: false
  registry-password:
    description: 'Enterprise registry password'
    required: false
  os:
    description: 'Operating system'
    required: true
  init-script-folder:
    description: 'initialized directory'
    required: false

outputs:
  database-type:
    description: 'Type of database that was setup'
    value: ${{ steps.mariadb-install.outputs.database-type }}

runs:
  using: 'composite'
  steps:
    - name: Add hosts entry
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          echo "127.0.0.1 mariadb.example.com" >> /c/Windows/System32/drivers/etc/hosts
        else
          echo "127.0.0.1 mariadb.example.com" | sudo tee -a /etc/hosts
        fi

    - name: Generate self-signed certificates
      shell: bash
      run: |
        SCRIPT_PATH="${{ github.action_path }}/generate-certs.sh"
        if [ "$RUNNER_OS" == "Windows" ]; then
          SCRIPT_PATH=$(echo "$SCRIPT_PATH" | sed 's|\\|/|g' | sed 's|C:|/c|')
        fi
        chmod +x "$SCRIPT_PATH"
        "$SCRIPT_PATH"
        
        echo "🔍 Debug: Certificate files generated:"
        ls -la .github/workflows/certs/
        echo ""
        echo "🔍 Debug: Certificate file contents:"
        echo "CA certificate exists: $(test -f .github/workflows/certs/ca.crt && echo 'YES' || echo 'NO')"
        echo "Server certificate exists: $(test -f .github/workflows/certs/server.crt && echo 'YES' || echo 'NO')"
        echo "Server key exists: $(test -f .github/workflows/certs/server.key && echo 'YES' || echo 'NO')"
        echo ""
        echo "🔍 Debug: Certificate file sizes:"
        wc -l .github/workflows/certs/ca.crt .github/workflows/certs/server.crt .github/workflows/certs/server.key 2>/dev/null || echo "Some files missing"

    - name: Create SSL Configuration File
      shell: bash
      run: |
        echo "Creating SSL configuration file..."
        
        if [ "$RUNNER_OS" == "Windows" ]; then
          SSL_CA="${{ github.workspace }}/.github/workflows/certs/ca.crt"
          SSL_CERT="${{ github.workspace }}/.github/workflows/certs/server.crt"
          SSL_KEY="${{ github.workspace }}/.github/workflows/certs/server.key"
        else
          SSL_CA="/etc/mysql/ssl/ca.crt"
          SSL_CERT="/etc/mysql/ssl/server.crt"
          SSL_KEY="/etc/mysql/ssl/server.key"
        fi
        
        cat > .github/workflows/certs/99-ssl.cnf << EOF
        [mariadb]
        # SSL Configuration
        ssl_ca = $SSL_CA
        ssl_cert = $SSL_CERT
        ssl_key = $SSL_KEY
        
        # Performance Configuration
        max-connections = 500
        EOF

    - name: Setup MariaDB
      id: mariadb-install
      if: inputs.db-type != 'mysql'
      uses: rusher/action-setup-mariadb@master
      with:
        tag: ${{ inputs.db-tag }}
        root-password: ${{ inputs.test-db-password }}
        database: ${{ inputs.test-db-database }}
        registry: ${{ inputs.db-type == 'enterprise' && 'docker.mariadb.com/enterprise-server' || (inputs.db-type == 'dev' && 'quay.io/mariadb-foundation/mariadb-devel' || '') }}
        registry-user: ${{ inputs.registry-user }}
        registry-password: ${{ inputs.registry-password }}
        additional-conf: |
          ${{ inputs.additional-conf }}
        ssl-script-folder: ${{ github.workspace }}/.github/workflows/certs
        init-script-folder: ${{ inputs.init-script-folder }}
        configuration-file: ${{ github.workspace }}.github/workflows/certs/99-ssl.cnf
        port: ${{ inputs.test-db-port }}

    - name: Setup MySQL
      if: inputs.db-type == 'mysql'
      shell: bash
      run: |
        SCRIPT_PATH="${{ github.action_path }}/setup-mysql.sh"
        if [ "$RUNNER_OS" == "Windows" ]; then
          SCRIPT_PATH=$(echo "$SCRIPT_PATH" | sed 's|\\|/|g' | sed 's|C:|/c|')
        fi
        chmod +x "$SCRIPT_PATH"
        "$SCRIPT_PATH" \
          "${{ inputs.db-tag }}" \
          "${{ inputs.test-db-database }}" \
          "${{ inputs.test-db-password }}" \
          "${{ inputs.test-db-port }}" \
          "${{ inputs.registry-user }}" \
          "${{ inputs.registry-password }}" \
          "${{ inputs.db-type == 'mysql' && 'docker.io' || '' }}" \
          "${{ inputs.os }}" \
          "${{ github.workspace }}"
